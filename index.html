<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jidori-kun — webcam capture</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #14151a; color: #e6e6e6;
        font-family: system-ui, sans-serif; }
      #wrap { max-width: 960px; margin: 0 auto; padding: 16px; }
      h1 { font-size: 16px; margin: 0 0 12px; }
      #stage { position: relative; background: #000; border-radius: 12px; overflow: hidden;
        aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center; }
      video { width: 100%; height: 100%; object-fit: contain; }
      video.mirror { transform: scaleX(-1); }
      #count { position: absolute; inset: 0; display: none; align-items: center;
        justify-content: center; font-size: 22vmin; font-weight: 800; color: #fff;
        text-shadow: 0 4px 30px rgba(0,0,0,.7); background: rgba(0,0,0,.15); }
      #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; }
      #idle { position: absolute; opacity: .5; font-size: 13px; }
      .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 14px 0; }
      button { font: inherit; font-size: 14px; padding: 8px 14px; border-radius: 8px;
        border: 1px solid #3a3d46; background: #262932; color: #e6e6e6; cursor: pointer; }
      button.primary { background: #3a5bff; border-color: #3a5bff; font-weight: 600; }
      button:disabled { opacity: .4; cursor: default; }
      label { font-size: 13px; opacity: .85; display: inline-flex; gap: 6px; align-items: center; }
      select { font: inherit; padding: 6px 8px; border-radius: 7px; background: #262932;
        color: #e6e6e6; border: 1px solid #3a3d46; }
      #gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
      .shot { width: 160px; }
      .shot img { width: 100%; border-radius: 8px; display: block; border: 1px solid #333; }
      .shot a { display: block; text-align: center; font-size: 12px; margin-top: 4px; color: #9cc0ff; }
      #err { color: #ff8a8a; font-size: 13px; margin-top: 8px; min-height: 1em; }
      .hint { font-size: 12px; opacity: .55; }
      #header { display: flex; align-items: center; justify-content: space-between; }
      #settingsOverlay { position: fixed; inset: 0; background: rgba(0,0,0,.55);
        align-items: center; justify-content: center; z-index: 10; }
      #settingsOverlay:not([hidden]) { display: flex; }
      #settingsCard { width: 460px; max-width: 92vw; max-height: 90vh; overflow-y: auto;
        background: #1b1d23; border: 1px solid #333; border-radius: 12px; padding: 16px; }
      #settingsHead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      #closeSettings { background: transparent; border: none; color: #e6e6e6; font-size: 16px; cursor: pointer; }
      .srow { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
      .srow > span { width: 84px; font-size: 13px; opacity: .85; }
      .srow input[type="text"], .srow input[type="number"], .srow select { flex: 1; }
      #connSnippet { width: 100%; font-family: ui-monospace, monospace; font-size: 11px;
        background: #0e0f13; color: #cdd3de; border: 1px solid #3a3d46; border-radius: 6px; }
      #connUrl { word-break: break-all; }
      #updateBanner { display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        padding: 8px 12px; border-radius: 8px; background: #263a2a; border: 1px solid #3a6b4a;
        font-size: 13px; }
      #updateBanner:not([hidden]) { display: flex; }
      #updateBanner[hidden] { display: none; }
      #updateBanner span { flex: 1; }
      #updDismiss { background: transparent; border: none; color: #e6e6e6; cursor: pointer; }
      button.link { background: transparent; border: none; color: #9cc0ff; text-decoration: underline;
        cursor: pointer; padding: 0; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="updateBanner" hidden>
        <span>新しいバージョン <b id="updVer"></b> が公開されています。</span>
        <button id="updNotes" class="link" hidden>変更点</button>
        <button id="updDownload" class="primary">ダウンロード</button>
        <button id="updDismiss" title="閉じる">×</button>
      </div>
      <div id="header">
        <h1>jidori-kun — webcam capture</h1>
        <button id="openSettings" title="ネットワーク設定">⚙ 設定</button>
      </div>
      <div id="stage">
        <div id="idle">カメラ未起動 — 「カメラ開始」を押してください</div>
        <video id="video" playsinline muted class="mirror"></video>
        <div id="count"></div>
        <div id="flash"></div>
      </div>

      <div class="controls">
        <button id="start" class="primary">カメラ開始</button>
        <select id="device" title="カメラ選択"></select>
        <label>カウント
          <select id="secs">
            <option value="0">なし</option>
            <option value="3" selected>3秒</option>
            <option value="5">5秒</option>
            <option value="10">10秒</option>
          </select>
        </label>
        <label>連写
          <select id="burst">
            <option value="1" selected>1枚</option>
            <option value="3">3枚</option>
            <option value="5">5枚</option>
          </select>
        </label>
        <label><input type="checkbox" id="mirror" checked /> 鏡像</label>
        <button id="shoot" disabled>撮影</button>
      </div>

      <div id="err"></div>
      <div class="hint">撮った写真はサムネの「保存」からダウンロードできます。生成画像の ref に使えます。</div>
      <div id="gallery"></div>
    </div>

    <div id="settingsOverlay" hidden>
      <div id="settingsCard">
        <div id="settingsHead">
          <b>ネットワーク設定（MCP over HTTP）</b>
          <button id="closeSettings">✕</button>
        </div>
        <p class="hint">
          ネットワーク上の別の Claude から <code>snap</code> を呼べるようにします。
          撮影はこの PC のカメラで行われます。
        </p>

        <label class="srow"><input type="checkbox" id="setEnabled" />
          起動時に自動でサーバを開始</label>

        <div class="srow"><span>ポート</span>
          <input type="number" id="setPort" min="1" max="65535" value="8790" /></div>

        <div class="srow"><span>公開範囲</span>
          <select id="setLan">
            <option value="true">LAN 内の他マシンから許可 (0.0.0.0)</option>
            <option value="false">この PC だけ (127.0.0.1)</option>
          </select></div>

        <div class="srow"><span>トークン</span>
          <input type="text" id="setToken" placeholder="必須：接続の合言葉" />
          <button id="genToken">生成</button></div>

        <div class="srow">
          <button id="saveSettings" class="primary">保存</button>
          <button id="startServer">開始</button>
          <button id="stopServer">停止</button>
          <span id="serverStatus" class="hint">停止中</span>
        </div>

        <div id="connInfo" hidden>
          <div class="hint">接続 URL（別マシンの Claude 用）:</div>
          <code id="connUrl"></code>
          <div class="hint" style="margin-top:8px">Claude の MCP 設定:</div>
          <textarea id="connSnippet" readonly rows="9"></textarea>
        </div>
        <div id="setErr" class="hint" style="color:#ff8a8a"></div>

        <div class="srow" style="border-top:1px solid #333; padding-top:12px; margin-top:8px">
          <span style="width:auto">アプリの更新</span>
          <button id="checkUpdate">更新を確認</button>
          <span id="updMsg" class="hint"></span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
